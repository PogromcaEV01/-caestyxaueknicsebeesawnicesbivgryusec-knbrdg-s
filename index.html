<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic PDF Reader 💅 (Lo-fi Era)</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  
  <style>
    :root {
      /* Baza - Tryb Cozy (Pomarańczowe vibes 🍊🍂) */
      --bg-color: #fff0e6;
      --text-color: #cc5500;
      --toolbar-bg: #ffdbb5;
      --btn-bg: #ff8c00;
      --btn-text: #fff;
      --pdf-filter: sepia(0.6) hue-rotate(-15deg) saturate(1.8) brightness(0.95);
    }

    /* Zwykły Ciemny - Classic Sigma 🦇 */
    .dark-mode {
      --bg-color: #121212;
      --text-color: #e0e0e0;
      --toolbar-bg: #1e1e1e;
      --btn-bg: #444;
      --btn-text: #fff;
      --pdf-filter: invert(0.9) hue-rotate(180deg) brightness(0.85);
    }

    /* Tryb Ciemny Brąz - Dark Academia vibes 🕰️ */
    .dark-brown-mode {
      --bg-color: #2c1a16;
      --text-color: #d7ccc8;
      --toolbar-bg: #3e2723;
      --btn-bg: #5d4037;
      --btn-text: #d7ccc8;
      --pdf-filter: invert(0.9) sepia(0.8) hue-rotate(330deg) brightness(0.8) saturate(1.5);
    }

    /* Tryb Fioletowy - Euphoria / Cyberpunk rizz 💜 */
    .purple-mode {
      --bg-color: #1a0b2e;
      --text-color: #e0b0ff;
      --toolbar-bg: #2d1b4e;
      --btn-bg: #673ab7;
      --btn-text: #fff;
      --pdf-filter: invert(0.9) sepia(0.5) hue-rotate(220deg) brightness(0.85) saturate(2);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Comic Sans MS', 'Arial', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.4s ease;
      min-height: 100vh;
    }

    .toolbar {
      background-color: var(--toolbar-bg);
      padding: 15px;
      width: 100%;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    button, select {
      background-color: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      padding: 10px 15px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.95rem;
      transition: 0.3s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    button:hover {
      transform: translateY(-2px) scale(1.05);
      filter: brightness(1.1);
    }

    #canvas-container {
      margin-top: 20px;
      margin-bottom: 20px;
      overflow: auto;
      max-width: 95vw;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #pdf-render {
      display: block;
      transition: filter 0.4s ease;
      filter: var(--pdf-filter);
    }
    
    .status {
      font-weight: bold;
      background: var(--btn-bg);
      color: var(--btn-text);
      padding: 10px 15px;
      border-radius: 20px;
    }

    .file-select {
      background-color: transparent;
      color: var(--text-color);
      border: 2px solid var(--btn-bg);
    }

    /* Magia YouTube Playera 🎧💅 */
    .yt-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      background: var(--toolbar-bg);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      z-index: 999;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
    }

    .yt-widget.hidden {
      transform: translateY(150%) scale(0.8);
      opacity: 0;
      pointer-events: none;
    }

    .yt-header {
      background: var(--btn-bg);
      color: var(--btn-text);
      padding: 10px;
      text-align: center;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .yt-header button {
      padding: 4px 10px;
      font-size: 0.8rem;
      box-shadow: none;
      background: rgba(255, 255, 255, 0.2);
    }

    .yt-header button:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: scale(1.1);
    }

    .yt-widget iframe {
      border: none;
      width: 100%;
      height: 180px;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <select id="file-selector" class="file-select">
      <option value="Carnagie Dale - Jak zdobyć przyjaciół i zjednać sobie ludzi.pdf">📚 Moja Książka</option>
      <option value="notatki.pdf">📝 Notatki</option>
      <option value="jakis_inny_plik.pdf">✨ Coś innego</option>
    </select>

    <div>
      <button id="prev-page">⬅️ Back</button>
      <span class="status">Strona: <span id="page-num">0</span> / <span id="page-count">0</span></span>
      <button id="next-page">Next ➡️</button>
    </div>

    <div>
      <button id="zoom-out">➖</button>
      <button id="zoom-in">➕</button>
    </div>

    <select id="theme-selector">
      <option value="cozy">Cozy (Pomarańcz) 🍊</option>
      <option value="dark">Zwykły Ciemny 🦇</option>
      <option value="dark-brown">Dark Academia 🕰️</option>
      <option value="purple">Midnight Fiolet 💜</option>
    </select>

    <button id="toggle-yt">🎵</button>
  </div>

  <div id="canvas-container">
    <canvas id="pdf-render"></canvas>
  </div>

  <div id="yt-widget" class="yt-widget hidden">
    <div class="yt-header">
      <span>Lo-Fi Vibe 🎧☕</span>
      <button id="close-yt">❌</button>
    </div>
    <iframe src="https://youtu.be/-FlxM_0S2lA?si=zV4rg05ixVWlIn9Q" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>

  <script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let pdfDoc = null,
        pageNum = 1,
        pageIsRendering = false,
        pageNumPending = null,
        scale = 1.5,
        currentFile = '',
        canvas = document.getElementById('pdf-render'),
        ctx = canvas.getContext('2d');

    const renderPage = num => {
      pageIsRendering = true;

      pdfDoc.getPage(num).then(page => {
        const viewport = page.getViewport({ scale });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderCtx = { canvasContext: ctx, viewport: viewport };

        page.render(renderCtx).promise.then(() => {
          pageIsRendering = false;
          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });

        document.getElementById('page-num').textContent = num;
        localStorage.setItem(`pdf-page-${currentFile}`, num);
      });
    };

    const queueRenderPage = num => {
      if (pageIsRendering) {
        pageNumPending = num;
      } else {
        renderPage(num);
      }
    };

    document.getElementById('prev-page').addEventListener('click', () => {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
    });

    document.getElementById('next-page').addEventListener('click', () => {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRenderPage(pageNum);
    });

    document.getElementById('zoom-in').addEventListener('click', () => {
      scale += 0.2;
      queueRenderPage(pageNum);
    });

    document.getElementById('zoom-out').addEventListener('click', () => {
      if (scale <= 0.6) return;
      scale -= 0.2;
      queueRenderPage(pageNum);
    });

    const loadPdf = (fileName) => {
      currentFile = fileName;
      const url = `./${fileName}`;
      
      pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
        pdfDoc = pdfDoc_;
        document.getElementById('page-count').textContent = pdfDoc.numPages;
        
        let savedPage = parseInt(localStorage.getItem(`pdf-page-${currentFile}`));
        pageNum = (savedPage && savedPage <= pdfDoc.numPages) ? savedPage : 1;
        
        renderPage(pageNum);
      }).catch(err => {
        console.error("Bruh, błąd:", err);
        alert(`O nie! 💀 Nie mogę wczytać pliku "${fileName}". Upewnij się, że taki plik masz na swoim GitHubie.`);
      });
    };

    const fileSelector = document.getElementById('file-selector');
    fileSelector.addEventListener('change', (e) => {
      loadPdf(e.target.value);
    });

    const themeSelector = document.getElementById('theme-selector');
    const savedTheme = localStorage.getItem('my-pdf-theme') || 'cozy';
    themeSelector.value = savedTheme;
    
    if (savedTheme !== 'cozy') {
      document.body.className = `${savedTheme}-mode`;
    }

    themeSelector.addEventListener('change', (e) => {
      const mode = e.target.value;
      localStorage.setItem('my-pdf-theme', mode);
      
      if (mode === 'cozy') {
        document.body.className = '';
      } else {
        document.body.className = `${mode}-mode`;
      }
    });

    // --- YT PLAYER LOGIC 🎧 ---
    const ytWidget = document.getElementById('yt-widget');
    const toggleYtBtn = document.getElementById('toggle-yt');
    const closeYtBtn = document.getElementById('close-yt');

    // Chowanie/pokazywanie playera
    toggleYtBtn.addEventListener('click', () => {
      ytWidget.classList.toggle('hidden');
    });

    closeYtBtn.addEventListener('click', () => {
      ytWidget.classList.add('hidden');
    });

    loadPdf(fileSelector.value);
  </script>
</body>
</html>
